<div class="toast-stack" aria-live="polite" aria-atomic="false">
  @for (toast of toasts; track toast.id) {
    <div class="toast" [class]="'toast--' + toast.type" role="alert">
      <app-icon
        [name]="iconFor(toast.type)"
        [size]="18"
        class="toast__icon"
      ></app-icon>

      <span class="toast__message">{{ toast.message }}</span>

      @if (toast.action) {
        <button class="toast__action" (click)="toast.action!.callback(); dismiss(toast.id)">
          {{ toast.action.label }}
        </button>
      }

      <button class="toast__close" (click)="dismiss(toast.id)" aria-label="Bezárás">
        <app-icon name="x" [size]="14"></app-icon>
      </button>
    </div>
  }
</div>
