<header class="topbar">
  <!-- Search -->
  <div class="search-box">
    <app-icon name="search" [size]="15" color="var(--text-muted)"></app-icon>
    <input type="text" placeholder="Keresés..." class="search-input" />
  </div>

  <!-- Actions -->
  <div class="topbar-actions">
    <!-- Notification bell -->
    <button class="icon-btn" title="Értesítések">
      <app-icon name="bell" [size]="18"></app-icon>
      <span class="notif-dot"></span>
    </button>

    <!-- User profile -->
    <a routerLink="/app/profile" class="user-chip">
      <div class="user-avatar">
        <app-icon name="user" [size]="14" color="#00d4ff"></app-icon>
      </div>
      <span class="user-label">Profil</span>
      <app-icon name="chevron-down" [size]="14" color="var(--text-muted)"></app-icon>
    </a>
  </div>
</header>
