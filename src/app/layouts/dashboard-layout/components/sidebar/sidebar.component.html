<aside class="sidebar">
  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-icon">
    <app-icon name="activity" [size]="18" color="#00d4ff"></app-icon>
    </div>
    <span class="brand-name">Krono<strong>Health</strong></span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <span class="nav-section-label">Főmenü</span>
    <ul class="nav-list">
      @for (item of navItems; track item.path) {
        <li class="nav-item">
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            class="nav-link"
          >
            <app-icon [name]="item.icon" [size]="18" class="nav-icon"></app-icon>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- User section bottom -->
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar">
      <app-icon name="user" [size]="16" color="#00d4ff"></app-icon>
      </div>
      <div class="user-info">
        <span class="user-name">Felhasználó</span>
        <span class="user-plan badge badge-cyan">Pro</span>
      </div>
    </div>
    <button class="logout-btn" title="Kijelentkezés">
      <app-icon name="log-out" [size]="16"></app-icon>
    </button>
  </div>
</aside>
