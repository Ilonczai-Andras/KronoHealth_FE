<div class="dashboard-container">
  <p-card class="welcome-card">
    <ng-template pTemplate="header">
      <div class="card-header">
        <h2>Dashboard</h2>
      </div>
    </ng-template>
    
    <p>Welcome to KronoHealth Frontend with Angular 18, NgRx, and PrimeNG!</p>
    
    <div class="button-group">
      <p-button 
        label="Load Users" 
        (onClick)="loadUsers()"
        [loading]="(loading$ | async)"
        icon="pi pi-refresh">
      </p-button>
    </div>
  </p-card>

  <div *ngIf="(error$ | async) as error" class="error-message">
    <p>{{ error }}</p>
  </div>

  <div *ngIf="!(loading$ | async) && (users$ | async) as users" class="users-list">
    <h3>Users</h3>
    <div *ngIf="users.length > 0; else noUsers">
      <p-card *ngFor="let user of users" class="user-card">
        <p><strong>ID:</strong> {{ user.id }}</p>
        <p><strong>Name:</strong> {{ user.name }}</p>
      </p-card>
    </div>
    <ng-template #noUsers>
      <p>No users available</p>
    </ng-template>
  </div>
</div>
